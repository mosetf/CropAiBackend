{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">
  <div class="card shadow p-4">
    <h2 class="mb-3 text-danger">👋 Are you sure you want to logout?</h2>
    <p class="mb-4">You will be redirected to the homepage after logging out.</p>

    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-danger">Logout</button>
        <a href="{% url 'yield_predictor:predict_yield' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
