[pytest]
DJANGO_SETTINGS_MODULE = cropai.core.settings
python_files = tests.py test_*.py *_tests.py
testpaths = cropai
pythonpath = . cropai
addopts = --strict-markers --tb=short
markers =
    auth = Authentication tests
    sessions = Session management tests
    predictions = Prediction endpoint tests
    crops = Crop model tests
    serializers = Serializer validation tests
