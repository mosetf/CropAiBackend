<!DOCTYPE html>
<html>
<head>
    <title>Optimization Results</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: auto;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }
        th {
            background-color: #f4f4f4;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Crop Optimization Results</h2>
    <table>
        <tr>
            <th>Year</th>
            <th>Harvest Decision</th>
            <th>Sell Now</th>
            <th>Reduce Pesticide</th>
        </tr>
        {% for row in results %}
        <tr>
            <td>{{ row.Year }}</td>
            <td>{{ row.Harvest_Decision }}</td>
            <td>{{ row.Sell_Now }}</td>
            <td>{{ row.Reduce_Pesticide }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
